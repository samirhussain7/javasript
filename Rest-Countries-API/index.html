<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./favicon/international.png" type="image/x-icon">
    <title>WorldCountries | Global Country Data</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <header>
        <nav>
          <h2>Where in the world?</h2>
          <button class="theme">
            <i class="ri-moon-line"></i> <span>Dark Mode</span>
          </button>
        </nav>
      </header>
      <div class="search-filter">
        <input type="text" name="input" placeholder="Search for a country.." autocomplete="off" />
        <select id="regions" name="select">
          <option value="all">All Region</option>
          <option value="africa">Africa</option>
          <option value="asia">Asia</option>
          <option value="europe">Europe</option>
          <option value="oceania">Oceania</option>
          <option value="americas">Americas</option>
          <option value="polar">Polar</option>
          <option value="antarctic ocean">Antarctic Ocean</option>
        </select>
      </div>
      <!-- country container -->
      <section class="main-container"></section>
    </main>
    <script src="./js/script.js" type="module"></script>
  </body>
</html>
