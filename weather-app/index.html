<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Weather app</title>
  <link rel="stylesheet" href="./css/output.css">
  <script src="./js/script.js" defer></script>
</head>
<body class="bg-[hsl(243,96%,9%)] text-white">
  <main class="w-full px-4 pb-12 max-w-[1440px] min-h-screen mx-auto lg:p-0">

    <nav class="py-5 flex justify-between items-center">
      <!-- Logo -->
      <div>
        <img class="w-44" src="./assets/images/logo.svg" alt="Logo">
      </div>
      <!-- Units Dropdown -->
      <div class="flex gap-1.5 items-center justify-center bg-gray-700 px-3 py-2 rounded">
        <img src="./assets/images/icon-units.svg" alt="Setting Svg">
        <h3 class="font-bold">Units</h3>
        <img src="./assets/images/icon-dropdown.svg" alt="Dropdown Svg">
      </div>

    </nav>

    <h1 class="text-6xl font-bold text-center my-10">How's the sky looking today?</h1>

    <!-- SECTION-1 -->
     <section>
      <!-- Searching container -->
       <form class="flex flex-col gap-3 my-10">
        <input class="w-full px-4 py-3 rounded-md bg-gray-700" type="text" placeholder="Seach for a place...">
        <button class="w-full px-4 py-3 rounded-md text-center font-semibold bg-blue-500 active:scale-95 cursor-pointer duration-150">Search</button>
       </form>

       <!-- Grid Section -->
        <div class="h-[70svh] grid grid-cols-2 grid-rows-4 gap-4">
          <div class="row-start-1 row-end-3 col-start-1 col-end-3 bg-blue-500 rounded-2xl"></div>
          <div class="w-full h-full bg-yellow-800 rounded-xl"></div>
          <div class="w-full h-full bg-yellow-800 rounded-xl"></div>
          <div class="w-full h-full bg-yellow-800 rounded-xl"></div>
          <div class="w-full h-full bg-yellow-800 rounded-xl"></div>
        </div>

     </section>

     <!-- SECTION-2 -->
      <section class="my-8">
        <h2 class="font-bold text-xl mb-5">Daily forecast</h2>

        <!-- Grid-1 -->
         <div class="h-[65vh] grid grid-cols-3 grid-rows-3' gap-4">

          <div class="w-full h-full rounded-xl bg-gray-700"></div>
          <div class="w-full h-full rounded-xl bg-gray-700"></div>
          <div class="w-full h-full rounded-xl bg-gray-700"></div>
          <div class="w-full h-full rounded-xl bg-gray-700"></div>
          <div class="w-full h-full rounded-xl bg-gray-700"></div>
          <div class="w-full h-full rounded-xl bg-gray-700"></div>
          <div class="w-full h-full rounded-xl bg-gray-700"></div>

         </div>
      </section>

      <!-- SECTION-3 -->
       <section>
        <div class="h-[85svh] grid grid-cols-1 grid-rows-9 p-3.5 gap-4 rounded-2xl bg-gray-700">
          <div class="w-full h-full bg-gray-600 rounded-xl"></div>
          <div class="w-full h-full bg-gray-600 rounded-xl"></div>
          <div class="w-full h-full bg-gray-600 rounded-xl"></div>
          <div class="w-full h-full bg-gray-600 rounded-xl"></div>
          <div class="w-full h-full bg-gray-600 rounded-xl"></div>
          <div class="w-full h-full bg-gray-600 rounded-xl"></div>
          <div class="w-full h-full bg-gray-600 rounded-xl"></div>
          <div class="w-full h-full bg-gray-600 rounded-xl"></div>
          <div class="w-full h-full bg-gray-600 rounded-xl"></div>
        </div>
       </section>
  </main>
</body>
</html>
